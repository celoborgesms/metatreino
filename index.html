<!DOCTYPE html><html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>MetaTreino</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, select, button { display:block; margin:10px 0; padding:8px; }
    .hidden { display:none; }
  </style>
</head>
<body><h2>Perfil</h2>
<input id="nome" placeholder="Nome">
<input id="idade" type="number" placeholder="Idade">
<input id="peso" type="number" placeholder="Peso (kg)">
<input id="altura" type="number" placeholder="Altura (m)">
<select id="objetivo">
  <option value="hipertrofia">Hipertrofia</option>
  <option value="emagrecimento">Emagrecimento</option>
  <option value="condicionamento">Condicionamento</option>
</select>
<button onclick="salvarPerfil()">Calcular e Salvar</button><p id="resultado"></p><hr><h2>Check-in</h2>
<select id="energia">
  <option value="alta">Alta</option>
  <option value="media">Média</option>
  <option value="baixa">Baixa</option>
</select><select id="dor">
  <option value="nenhuma">Nenhuma dor</option>
  <option value="perna">Dor na perna</option>
  <option value="braco">Dor no braço</option>
</select><button onclick="salvarCheckin()">Salvar Check-in</button>

<hr><h2>Treino</h2>
<button onclick="gerarTreino()">Gerar treino</button>
<ul id="treino"></ul><script>
function salvarPerfil(){
  let peso = parseFloat(pesoInput.value);
  let altura = parseFloat(alturaInput.value);
  let imc = peso/(altura*altura);

  let classificacao = imc < 18.5 ? "Abaixo do peso" :
                      imc < 25 ? "Normal" :
                      imc < 30 ? "Sobrepeso" : "Obesidade";

  localStorage.setItem("perfil", JSON.stringify({
    nome: nome.value,
    idade: idade.value,
    peso,
    altura,
    objetivo: objetivo.value,
    imc,
    classificacao
  }));

  resultado.innerText = "IMC: " + imc.toFixed(2) + " - " + classificacao;
}

function salvarCheckin(){
  localStorage.setItem("checkin", JSON.stringify({
    energia: energia.value,
    dor: dor.value
  }));
}

function gerarTreino(){
  let perfil = JSON.parse(localStorage.getItem("perfil"));
  let check = JSON.parse(localStorage.getItem("checkin"));

  if(!perfil || !check){
    alert("Preencha perfil e check-in");
    return;
  }

  let treinoBase = {
    hipertrofia: ["Supino", "Agachamento", "Remada"],
    emagrecimento: ["Burpee", "Corrida", "Polichinelo"],
    condicionamento: ["Cordas", "Bike", "Flexão"]
  };

  let treino = [...treinoBase[perfil.objetivo]];

  if(check.energia === "baixa"){
    treino = treino.slice(0,2);
  }

  if(check.dor === "perna"){
    treino = treino.filter(e => e !== "Agachamento");
  }

  if(check.dor === "braco"){
    treino = treino.filter(e => e !== "Supino");
  }

  treinoLista.innerHTML = "";
  treino.forEach(e => {
    let li = document.createElement("li");
    li.innerText = e;
    treinoLista.appendChild(li);
  });
}
</script></body>
</html>
