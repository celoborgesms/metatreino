<script>
function salvarPerfil(){
  let nome = document.getElementById("nome").value;
  let idade = document.getElementById("idade").value;
  let peso = parseFloat(document.getElementById("peso").value);
  let altura = parseFloat(document.getElementById("altura").value);
  let objetivo = document.getElementById("objetivo").value;

  if(!peso || !altura){
    alert("Preencha peso e altura");
    return;
  }

  let imc = peso/(altura*altura);

  let classificacao = imc < 18.5 ? "Abaixo do peso" :
                      imc < 25 ? "Normal" :
                      imc < 30 ? "Sobrepeso" : "Obesidade";

  localStorage.setItem("perfil", JSON.stringify({
    nome, idade, peso, altura, objetivo, imc, classificacao
  }));

  document.getElementById("resultado").innerText =
    "IMC: " + imc.toFixed(2) + " - " + classificacao;
}

function salvarCheckin(){
  let energia = document.getElementById("energia").value;
  let dor = document.getElementById("dor").value;

  localStorage.setItem("checkin", JSON.stringify({ energia, dor }));
  alert("Check-in salvo!");
}

function gerarTreino(){
  let perfil = JSON.parse(localStorage.getItem("perfil"));
  let check = JSON.parse(localStorage.getItem("checkin"));

  if(!perfil || !check){
    alert("Preencha perfil e check-in");
    return;
  }

  let treinoBase = {
    hipertrofia: ["Supino", "Agachamento", "Remada"],
    emagrecimento: ["Burpee", "Corrida", "Polichinelo"],
    condicionamento: ["Cordas", "Bike", "Flexão"]
  };

  let treino = [...treinoBase[perfil.objetivo]];

  if(check.energia === "baixa"){
    treino = treino.slice(0,2);
  }

  if(check.dor === "perna"){
    treino = treino.filter(e => e !== "Agachamento");
  }

  if(check.dor === "braco"){
    treino = treino.filter(e => e !== "Supino");
  }

  let lista = document.getElementById("treino");
  lista.innerHTML = "";

  treino.forEach(e => {
    let li = document.createElement("li");
    li.innerText = e;
    lista.appendChild(li);
  });
}
</script>
